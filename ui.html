<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文件收纳箱</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ===========================================================
   全局变量 & 主题
   =========================================================== */
:root{
    --primary:#6366f1;
    --primary-hover:#4f46e5;
    --primary-light:#eef2ff;
    --bg:#f5f7fa;
    --bg-card:#ffffff;
    --bg-sidebar:#1e293b;
    --bg-sidebar-hover:#334155;
    --text:#1e293b;
    --text-sub:#64748b;
    --text-light:#94a3b8;
    --text-sidebar:#cbd5e1;
    --border:#e2e8f0;
    --hover:#f1f5f9;
    --danger:#ef4444;
    --success:#10b981;
    --radius:10px;
    --radius-sm:6px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 4px 12px rgba(0,0,0,.08);
    --shadow-lg:0 10px 30px rgba(0,0,0,.12);
    --transition:.2s ease;
}

*{margin:0;padding:0;box-sizing:border-box;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;}

html,body{height:100%;font-size:14px;color:var(--text);
  font-family:"Segoe UI","Microsoft YaHei",-apple-system,sans-serif;
  background:var(--bg);overflow:hidden;}

img,video{display:block;}
button{font-family:inherit;}

/* 滚动条 */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#94a3b8;}

/* ===========================================================
   总体布局
   =========================================================== */
#app{display:flex;height:100vh;}

/* ===========================================================
   侧边栏
   =========================================================== */
.sidebar{
    width:240px;flex-shrink:0;
    background:var(--bg-sidebar);
    color:var(--text-sidebar);
    display:flex;flex-direction:column;
    padding:20px 0;
}
.sidebar-header{padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.brand{display:flex;align-items:center;gap:10px;color:#fff;}
.brand-logo{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#fff;font-weight:700;
}
.brand-name{font-size:16px;font-weight:600;}
.brand-tag{font-size:11px;opacity:.55;margin-top:2px;letter-spacing:.5px;}

.nav{padding:14px 12px;flex:1;overflow-y:auto;}
.nav-group-title{
    font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--text-light);opacity:.6;
    padding:14px 12px 8px;
}
.nav-item{
    display:flex;align-items:center;gap:12px;
    padding:10px 14px;margin:2px 0;border-radius:var(--radius-sm);
    cursor:pointer;transition:var(--transition);
    color:var(--text-sidebar);
}
.nav-item:hover{background:var(--bg-sidebar-hover);color:#fff;}
.nav-item.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.4);}
.nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-label{flex:1;font-weight:500;font-size:13.5px;}
.nav-count{
    font-size:11px;background:rgba(255,255,255,.1);
    padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;
}
.nav-item.active .nav-count{background:rgba(255,255,255,.25);}

.sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06);
    font-size:11px;color:var(--text-light);opacity:.6;line-height:1.6;}

/* ===========================================================
   主区域
   =========================================================== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}

.topbar{
    height:64px;background:#fff;border-bottom:1px solid var(--border);
    padding:0 32px;display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
}
.topbar-title{font-size:20px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--text-sub);margin-top:2px;}
.topbar-actions{display:flex;gap:10px;}
.version-badge{font-size:11px;color:var(--text-sub);margin-left:4px;padding:2px 8px;background:var(--hover);border-radius:4px;font-weight:500;align-self:center;user-select:none;}

.btn{
    height:36px;padding:0 16px;border-radius:var(--radius-sm);
    border:1px solid var(--border);background:#fff;color:var(--text);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    font-size:13px;font-weight:500;transition:var(--transition);
}
.btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-hover);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-danger:hover{background:#dc2626;color:#fff;}
.btn svg{width:16px;height:16px;}

.content{flex:1;overflow-y:auto;padding:24px 32px;}

/* ===========================================================
   拖拽区
   =========================================================== */
.dropzone{
    border:2px dashed var(--border);background:#fff;
    border-radius:var(--radius);padding:36px;text-align:center;
    transition:var(--transition);margin-bottom:24px;
}
.dropzone.drag-over{border-color:var(--primary);background:var(--primary-light);
    transform:scale(1.01);}
.dropzone-icon{
    width:64px;height:64px;margin:0 auto 12px;
    background:var(--primary-light);border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--primary);
}
.dropzone-icon svg{width:32px;height:32px;}
.dropzone h3{font-size:16px;margin-bottom:6px;font-weight:600;}
.dropzone p{color:var(--text-sub);font-size:13px;margin-bottom:14px;}

/* ===========================================================
   目录卡片网格
   =========================================================== */
.section-title{font-size:13px;font-weight:600;color:var(--text-sub);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}

.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.folder-card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:16px;display:flex;align-items:center;gap:14px;
    transition:var(--transition);box-shadow:var(--shadow-sm);
    position:relative;cursor:pointer;
}
.folder-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);
    border-color:var(--primary);}
.folder-card .file-checkbox{top:10px;left:10px;}
.folder-card:hover .file-checkbox,.folder-card .file-checkbox.checked{opacity:1;}
.folder-card-icon{
    width:44px;height:44px;border-radius:10px;
    background:linear-gradient(135deg,#fbbf24,#f59e0b);
    display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;
}
.folder-card-icon svg{width:24px;height:24px;}
.folder-card-info{flex:1;min-width:0;}
.folder-card-name{font-weight:600;font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-card-path{font-size:12px;color:var(--text-sub);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;
    -webkit-user-select:text;user-select:text;}
.folder-card-actions{display:flex;gap:4px;margin-left:auto;}

.icon-btn{
    width:32px;height:32px;border:none;background:transparent;
    border-radius:var(--radius-sm);cursor:pointer;color:var(--text-sub);
    display:inline-flex;align-items:center;justify-content:center;
    transition:var(--transition);
}
.icon-btn:hover{background:var(--hover);color:var(--text);}
.icon-btn.danger:hover{background:#fee2e2;color:var(--danger);}
.icon-btn.btn-perm-delete{color:var(--danger);}
.icon-btn.btn-perm-delete:hover{background:#fee2e2;}
.icon-btn.btn-remove{color:var(--text-sub);}
.icon-btn.btn-remove:hover{background:var(--hover);color:var(--text);border-color:var(--border);}
.icon-btn svg{width:16px;height:16px;}

/* ===========================================================
   文件网格 (视频 / 图片)
   =========================================================== */
.file-grid{display:grid;gap:16px;}
.file-grid.video,
.file-grid.image{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}

.file-card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;transition:var(--transition);position:relative;
    box-shadow:var(--shadow-sm);
    /* 浏览器原生虚拟渲染：跳过视口外卡片的布局和绘制，大幅降低 DOM 开销 */
    content-visibility:auto;
    contain-intrinsic-size:auto 240px;
}
.file-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}

.file-thumb{
    width:100%;aspect-ratio:4/3;background:#f1f5f9;position:relative;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-light);overflow:hidden;
}
.file-thumb img{width:100%;height:100%;object-fit:cover;}
.file-thumb-ph{font-size:36px;}
.file-thumb-ph svg{width:48px;height:48px;}
.file-thumb-badge{
    position:absolute;right:8px;top:8px;
    background:rgba(0,0,0,.65);color:#fff;
    font-size:11px;padding:2px 8px;border-radius:4px;backdrop-filter:blur(4px);
}
.file-thumb-play{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.3);opacity:0;transition:var(--transition);
}
.file-card:hover .file-thumb-play{opacity:1;}
.file-thumb-play svg{width:48px;height:48px;color:#fff;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}

.file-meta{padding:10px 12px;}
.file-name{font-size:13px;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-info{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11.5px;color:var(--text-sub);margin-top:4px;
}

/* ===========================================================
   文档列表
   =========================================================== */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:10px;}
.doc-card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 14px;display:flex;align-items:center;gap:12px;
    cursor:pointer;transition:var(--transition);box-shadow:var(--shadow-sm);
}
.doc-card:hover{transform:translateY(-1px);box-shadow:var(--shadow);
    border-color:var(--primary);}
.doc-icon{
    width:42px;height:42px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;color:#fff;
    flex-shrink:0;font-weight:700;font-size:12px;
}
.doc-icon.pdf{background:#ef4444;}
.doc-icon.doc{background:#2563eb;}
.doc-icon.xls{background:#16a34a;}
.doc-icon.ppt{background:#ea580c;}
.doc-icon.txt{background:#64748b;}
.doc-card-meta{flex:1;min-width:0;}
.doc-card-name{font-weight:500;font-size:13px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-card-info{font-size:11.5px;color:var(--text-sub);margin-top:2px;
    display:flex;gap:12px;}
.doc-card-actions{display:flex;gap:2px;}

/* ===========================================================
   状态视图 (空 / 加载)
   =========================================================== */
.empty{
    text-align:center;padding:60px 20px;color:var(--text-sub);
}
.empty-icon{
    width:80px;height:80px;margin:0 auto 16px;
    background:var(--hover);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-light);
}
.empty-icon svg{width:36px;height:36px;}
.empty h3{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text);}
.empty p{font-size:13px;}

.loading{display:flex;align-items:center;justify-content:center;gap:12px;
    padding:60px;color:var(--text-sub);}
.spinner{
    width:24px;height:24px;border:3px solid #e2e8f0;
    border-top-color:var(--primary);border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===========================================================
   模态框 (图片预览 / 视频播放 / 确认对话框)
   =========================================================== */
.modal-mask{
    position:fixed;inset:0;background:rgba(15,23,42,.85);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;backdrop-filter:blur(8px);
    animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.modal-close{
    position:absolute;top:20px;right:24px;
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.12);color:#fff;
    border:none;cursor:pointer;font-size:22px;
    display:flex;align-items:center;justify-content:center;
    z-index:1001;backdrop-filter:blur(8px);transition:var(--transition);
}
.modal-close:hover{background:rgba(255,255,255,.2);}
.modal-info{
    position:absolute;top:20px;left:24px;color:#fff;
    background:rgba(255,255,255,.1);padding:10px 16px;border-radius:8px;
    backdrop-filter:blur(8px);max-width:60vw;
    -webkit-user-select:text;user-select:text;
}
.modal-info-name{font-weight:600;font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modal-info-path{font-size:11.5px;opacity:.7;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.modal-image{max-width:92vw;max-height:88vh;
    box-shadow:0 20px 60px rgba(0,0,0,.5);border-radius:6px;}
.modal-video{max-width:92vw;max-height:88vh;outline:none;
    box-shadow:0 20px 60px rgba(0,0,0,.5);border-radius:6px;background:#000;}

/* 模态框左右切换按钮 (图片/视频全局列表切换) */
.modal-nav{
    position:absolute;top:50%;transform:translateY(-50%);
    width:48px;height:80px;border:none;border-radius:8px;
    background:rgba(255,255,255,.15);color:#fff;
    font-size:28px;cursor:pointer;backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;
    transition:var(--transition);z-index:1001;
}
.modal-nav:hover{background:rgba(255,255,255,.3);}
.modal-nav-prev{left:16px;}
.modal-nav-next{right:16px;}
.modal-nav.disabled{opacity:.25;pointer-events:none;}

/* 自定义确认框 */
.dialog{
    background:#fff;border-radius:var(--radius);
    padding:28px;width:420px;max-width:90vw;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    border:1px solid var(--border);
}
.dialog h3{font-size:18px;margin-bottom:12px;color:var(--text);font-weight:600;}
.dialog p{font-size:14px;color:var(--text-sub);margin-bottom:24px;line-height:1.7;}
.dialog-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:4px;}
.dialog-actions .btn{height:36px;padding:0 18px;font-size:13px;font-weight:500;}

/* ===========================================================
   收藏功能相关样式
   =========================================================== */
/* 文件卡片上的收藏按钮 */
.fav-btn{
    position:absolute;top:8px;right:8px;z-index:10;
    width:32px;height:32px;border:none;border-radius:50%;
    background:rgba(0,0,0,.45);color:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s ease,background .2s ease;
    backdrop-filter:blur(4px);
}
.fav-btn:hover{background:rgba(0,0,0,.7);}
.file-card:hover .fav-btn{opacity:1;}
.fav-btn.active{color:#fbbf24;background:rgba(0,0,0,.6);opacity:1;}
.fav-btn svg{width:16px;height:16px;}

/* 收藏夹卡片 */
.fav-group-card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;display:flex;align-items:center;gap:14px;cursor:pointer;
    transition:var(--transition);box-shadow:var(--shadow-sm);
}
.fav-group-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary);}
.fav-group-card-icon{
    width:48px;height:48px;border-radius:12px;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
    display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;
}
.fav-group-card-icon svg{width:24px;height:24px;}
.fav-group-card-info{flex:1;min-width:0;}
.fav-group-card-name{font-weight:600;font-size:15px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fav-group-card-count{font-size:12px;color:var(--text-sub);margin-top:3px;}
.fav-group-card-actions{display:flex;gap:4px;}

/* 收藏弹窗 */
.fav-dialog-body{max-height:60vh;overflow-y:auto;}
.fav-dialog-groups{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.fav-dialog-group-item{
    padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
    cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:10px;
    background:#fff;
}
.fav-dialog-group-item:hover{border-color:var(--primary);background:var(--primary-light);}
.fav-dialog-group-item .name{flex:1;font-weight:500;font-size:14px;}
.fav-dialog-group-item .count{font-size:12px;color:var(--text-sub);}
.fav-dialog-new{
    border-top:1px solid var(--border);padding-top:14px;
    display:flex;gap:8px;align-items:center;
}
.fav-dialog-new input{
    flex:1;height:36px;padding:0 12px;border:1px solid var(--border);
    border-radius:var(--radius-sm);font-size:13px;outline:none;
}
.fav-dialog-new input:focus{border-color:var(--primary);}

/* 收藏夹内文件卡片的取消收藏按钮 */
.unfav-btn{
    width:28px;height:28px;border:none;border-radius:50%;
    background:transparent;color:var(--text-sub);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    transition:var(--transition);
}
.unfav-btn:hover{background:#fee2e2;color:var(--danger);}
.unfav-btn svg{width:14px;height:14px;}

/* ===========================================================
   搜索框
   =========================================================== */
.search-box{display:flex;align-items:center;gap:6px;margin-right:10px;position:relative;}
.search-input{
    width:220px;height:32px;padding:0 28px 0 30px;border:1px solid var(--border);border-radius:var(--radius-sm);
    font-size:13px;outline:none;background:#fff;transition:var(--transition);color:var(--text);
}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.search-input::placeholder{color:var(--text-sub);}
.search-box .search-icon{
    position:absolute;left:9px;top:50%;transform:translateY(-50%);
    color:var(--text-sub);pointer-events:none;
}
.search-box .search-icon svg{width:14px;height:14px;}
.search-clear{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;cursor:pointer;color:var(--text-sub);font-size:12px;padding:0;
}
.search-clear:hover{background:var(--hover);color:var(--text);}

/* ===========================================================
   批量操作栏
   =========================================================== */
.batch-bar{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;
    background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);
    box-shadow:var(--shadow-lg);padding:10px 18px;display:flex;align-items:center;gap:12px;
    animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.batch-bar-info{font-size:13px;color:var(--text);white-space:nowrap;}
.batch-bar-info strong{color:var(--primary);font-weight:600;}
.batch-bar .btn{height:34px;padding:0 14px;font-size:12.5px;font-weight:500;border-radius:var(--radius-sm);white-space:nowrap;min-width:56px;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
.batch-bar .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.batch-bar .btn-danger:hover{background:#dc2626;color:#fff;}
.batch-bar .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.batch-bar .btn-primary:hover{background:var(--primary-hover);color:#fff;}
.batch-bar .btn-warning{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.batch-bar .btn-warning:hover{background:#d97706;color:#fff;}
.batch-bar .btn-secondary{background:#64748b;color:#fff;border-color:#64748b;}
.batch-bar .btn-secondary:hover{background:#475569;color:#fff;}
.batch-bar .btn svg{width:14px;height:14px;}

/* ===========================================================
   卡片 checkbox & 操作按钮
   =========================================================== */
.file-checkbox{
    position:absolute;top:8px;left:8px;z-index:20;
    width:22px;height:22px;border-radius:5px;
    background:rgba(255,255,255,.95);border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    color:var(--primary);opacity:0;transition:var(--transition);
    box-shadow:0 2px 6px rgba(0,0,0,.12);pointer-events:auto;
}
.file-checkbox svg{width:14px;height:14px;pointer-events:none;}
.file-card:hover .file-checkbox,.file-checkbox.checked{opacity:1;}
.file-checkbox.checked{background:var(--primary);border-color:var(--primary);color:#fff;}
.file-checkbox:active{transform:scale(.92);}

.file-card-actions{
    position:absolute;top:8px;right:8px;z-index:15;
    display:flex;gap:3px;opacity:0;transition:var(--transition);
}
.file-card:hover .file-card-actions{opacity:1;}
.file-card-actions .icon-btn{

<script>
/* ===========================================================
   迷你 Vue-Style 响应式框架  (~70 行)
   - reactive(obj)  把对象变成响应式; 任意属性改动自动调度渲染
   - watchEffect(fn) 自动追踪依赖, 数据变了就重跑
   - render(...)    用模板字面量生成 HTML, 集中刷新 DOM
   =========================================================== */
let _activeEffect = null;
const _depMap = new WeakMap();

function track(target, key){
    if(!_activeEffect) return;
    let deps = _depMap.get(target);
    if(!deps){ deps = new Map(); _depMap.set(target, deps); }
    let set = deps.get(key);
    if(!set){ set = new Set(); deps.set(key, set); }
    set.add(_activeEffect);
}
function trigger(target, key){
    const deps = _depMap.get(target);
    if(!deps) return;
    const set = deps.get(key);
    if(!set) return;
    // 复制一份避免遍历过程中变化
    [...set].forEach(eff => eff());
}
function reactive(target){
    return new Proxy(target, {
        get(t, k, r){
            const v = Reflect.get(t, k, r);
            track(t, k);
            // 嵌套对象/数组自动转响应式
            return (v && typeof v === 'object') ? reactive(v) : v;
        },
        set(t, k, v, r){
            const ok = Reflect.set(t, k, v, r);
            trigger(t, k);
            return ok;
        }
    });
}
let _scheduled = false;
function watchEffect(fn){
    const eff = () => {
        if(_scheduled) return;
        _scheduled = true;
        requestAnimationFrame(() => {
            _scheduled = false;
            _activeEffect = eff;
            try { fn(); } finally { _activeEffect = null; }
        });
    };
    _activeEffect = eff;
    try { fn(); } finally { _activeEffect = null; }
}

/* ===========================================================
   工具函数
   =========================================================== */
function escapeHtml(s){
    if(s==null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}
function formatSize(bytes){
    if(!bytes) return '0 B';
    const units = ['B','KB','MB','GB','TB'];
    let i = 0; let n = bytes;
    while(n >= 1024 && i < units.length-1){ n /= 1024; i++; }
    return n.toFixed(n>=10||i===0?0:1) + ' ' + units[i];
}
function formatTime(ts){
    if(!ts) return '';
    const d = new Date(ts*1000);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
}
function getFolderName(p){
    if(!p) return '';
    const norm = p.replace(/\\/g,'/').replace(/\/$/,'');
    const parts = norm.split('/');
    return parts[parts.length-1] || p;
}
function docColor(ext){
    if(['.pdf'].includes(ext)) return {cls:'pdf', label:'PDF'};
    if(['.doc','.docx','.rtf','.odt','.wps'].includes(ext)) return {cls:'doc', label:'DOC'};
    if(['.xls','.xlsx','.csv','.ods','.et'].includes(ext)) return {cls:'xls', label:'XLS'};
    if(['.ppt','.pptx','.odp','.dps'].includes(ext)) return {cls:'ppt', label:'PPT'};
    return {cls:'txt', label:ext.replace('.','').toUpperCase().slice(0,3) || 'TXT'};
}

/* ===========================================================
   排序与分页辅助函数
   =========================================================== */
function sortList(list){
    if(!list || !list.length) return [];
    const sorted = [...list];
    const dir = state.sortOrder === 'asc' ? 1 : -1;
    sorted.sort((a, b) => {
        if(state.sortBy === 'name'){
            return dir * String(a.name || '').localeCompare(String(b.name || ''), undefined, {numeric:true, sensitivity:'base'});
        }
        if(state.sortBy === 'modified') return dir * ((a.modified || 0) - (b.modified || 0));
        if(state.sortBy === 'created') return dir * ((a.created || 0) - (b.created || 0));
        if(state.sortBy === 'size') return dir * ((a.size || 0) - (b.size || 0));
        return 0;
    });
    return sorted;
}
function paginate(list){
    const total = list.length;
    // 防御性检查: 确保 pageSize 是正整数, 防止异常值导致分页错乱
    let ps = parseInt(state.pageSize, 10);
    if(!ps || ps < 1) ps = 20;
    const totalPages = total > 0 ? Math.max(1, Math.ceil(total / ps)) : 1;
    let cp = parseInt(state.currentPage, 10);
    if(!cp || cp < 1) cp = 1;
    const page = Math.min(cp, totalPages);
    const start = (page - 1) * ps;
    const end = start + ps;
    return { items: list.slice(start, end), totalPages, page, total, start, end };
}
function buildPaginationHtml(page, totalPages, total, onClickFn){
    if(totalPages <= 1) return '';
    let html = `<div class="pagination">
        <span class="page-info">${page} / ${totalPages} 页 (共 ${total} 条)</span>
        <button ${page <= 1 ? 'disabled' : ''} onclick="${onClickFn}(${page - 1})">‹</button>`;
    const show = [];
    const add = (p) => { if(p >= 1 && p <= totalPages && !show.includes(p)) show.push(p); };
    add(1); add(totalPages); add(page); add(page-1); add(page+1); add(page-2); add(page+2);
    show.sort((a,b)=>a-b);
    let last = 0;
    for(const p of show){
        if(last && p > last + 1) html += `<button class="page-num ellipsis" disabled>...</button>`;
        const cls = p === page ? 'page-num active' : 'page-num';
        html += `<button class="${cls}" onclick="${onClickFn}(${p})">${p}</button>`;
        last = p;
    }
    html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="${onClickFn}(${page + 1})">›</button>`;
    html += `<span class="sort-label" style="margin-left:12px;">每页:</span>`;
    html += `<select class="page-size-select" onchange="App.setPageSize(parseInt(this.value))">`;
    html += `<option value="10" ${state.pageSize===10?'selected':''}>10条</option>`;
    html += `<option value="20" ${state.pageSize===20?'selected':''}>20条</option>`;
    html += `<option value="50" ${state.pageSize===50?'selected':''}>50条</option>`;
    html += `<option value="100" ${state.pageSize===100?'selected':''}>100条</option>`;
    html += `</select></div>`;
    return html;
}

/* ===========================================================
   PyWebView API 适配层
   pywebview 加载完成前 window.pywebview 可能未就绪, 这里做一层等待
   =========================================================== */
function waitPyWebview(){
    // 检测 pywebview 是否真的"可用" (api 对象有期望的方法, 不只是有壳)
    function ready(){
        const api = window.pywebview && window.pywebview.api;
        if(!api) return false;
        return typeof api.get_folders === 'function'
            || typeof api.getFolders   === 'function';
    }
    return new Promise(resolve => {
        if(ready()){ resolve(); return; }
        const start = Date.now();
        const timer = setInterval(() => {
            if(ready()){ clearInterval(timer); resolve(); }
            else if(Date.now() - start > 15000){
                // 15 秒兜底; 超时也 resolve, 让具体错误显出来
                clearInterval(timer); resolve();
            }
        }, 50);
        // pywebview 4+ 注入完成会派发这个事件
        window.addEventListener('pywebviewready', () => {
            // 注入完成后再等 200ms, 防止方法 lazy 绑定
            setTimeout(() => {
                if(ready()){ clearInterval(timer); resolve(); }
            }, 200);
        }, { once:true });
    });
}
/* ---------- 媒体资源缓存 (LRU, 上限 30) ---------- */
const MAX_MEDIA_CACHE = 30;
const mediaCache = new Map();
function getCachedMedia(key){
    if(!mediaCache.has(key)) return undefined;
    const val = mediaCache.get(key);
    mediaCache.delete(key);
    mediaCache.set(key, val);
    return val;
}
function setCachedMedia(key, value){
    if(!value) return;
    if(mediaCache.has(key)) mediaCache.delete(key);
    else if(mediaCache.size >= MAX_MEDIA_CACHE){
        const firstKey = mediaCache.keys().next().value;
        mediaCache.delete(firstKey);
    }
    mediaCache.set(key, value);
}

const Api = (() => {
    // pywebview 4.0+ 会把 Python 的 snake_case 自动转成 camelCase 暴露,
    // 旧版本仍是 snake_case. 这里做双命名兼容查找.
    function pick(snake){
        const api = window.pywebview && window.pywebview.api;
        if(!api){
            throw new Error('pywebview.api 对象未注入, 请重启程序');
        }
        const camel = snake.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
        const fn = api[snake] || api[camel];
        if(typeof fn !== 'function'){
            const keys = Object.keys(api);
            throw new Error(
                `API 未找到: ${snake} / ${camel}\n` +
                `当前可用方法: [${keys.join(', ') || '空'}]`
            );
        }
        return fn;
    }
    return {
        getFolders:   ()  => pick('get_folders')(),
        addFolder:    (p) => pick('add_folder')(p),
        removeFolder: (p) => pick('remove_folder')(p),
        scanAll:      ()  => pick('scan_all')(),
        scanOne:      (p) => pick('scan_one')(p),
        openFile:     (p) => pick('open_file')(p),
        showInFolder: (p) => pick('show_in_folder')(p),
        openFolder:   (p) => pick('open_folder')(p),
        getVersion:   ()  => pick('get_version')(),
        getCachedFiles: () => pick('get_cached_files')(),
        readImage:    (p) => {
            const cached = getCachedMedia('img:'+p);
            if(cached) return Promise.resolve(cached);
            return pick('read_image_base64')(p).then(data => { setCachedMedia('img:'+p, data); return data; });
        },
        getImageThumb:(p) => pick('get_image_thumb')(p),
        readVideo:    (p) => {
            const cached = getCachedMedia('vid:'+p);
            if(cached) return Promise.resolve(cached);
            return pick('read_video_base64')(p).then(data => { setCachedMedia('vid:'+p, data); return data; });
        },
        getVideoCover:(p) => pick('get_video_cover')(p),
        getVideoPreview:(p) => pick('get_video_preview_frames')(p),
        deleteFolderPermanently: (p) => pick('delete_folder_permanently')(p),
        pickFolder:   ()  => pick('pick_folder')(),
        pickTargetFolder: () => pick('pick_target_folder')(),
        moveFavGroup: (cat, gid, path) => pick('move_fav_group')(cat, gid, path),
        // --- 收藏功能 API ---
        getFavGroups: (cat) => pick('get_favorite_groups')(cat),
        createFavGroup: (cat, name) => pick('create_favorite_group')(cat, name),
        renameFavGroup: (cat, gid, name) => pick('rename_favorite_group')(cat, gid, name),
        deleteFavGroup: (cat, gid) => pick('delete_favorite_group')(cat, gid),
        addToFavorites: (cat, gid, path) => pick('add_to_favorites')(cat, gid, path),
        removeFromFavorites: (cat, gid, path) => pick('remove_from_favorites')(cat, gid, path),
        getFavItems: (cat, gid) => pick('get_favorite_items')(cat, gid),
        isFavorited: (cat, path) => pick('is_favorited')(cat, path),
        getSettings: () => pick('get_settings')(),
        saveSettings: (s) => pick('save_settings')(s),
        // --- 项目文件夹 API ---
        getProjectFolders: () => pick('get_project_folders')(),
        addProjectFolder: (p) => pick('add_project_folder')(p),
        removeProjectFolder: (p) => pick('remove_project_folder')(p),
        deleteProjectFolderReal: (p) => pick('delete_project_folder_real')(p),
        batchRemoveProjectFolders: (paths) => pick('batch_remove_project_folders')(paths),
        batchDeleteProjectReal: (paths) => pick('batch_delete_project_real')(paths),
        getProjectItems: () => pick('get_project_items')(),
        // --- 文件删除 / 搜索 / 批量操作 ---
        deleteFileMap: (cat, path) => pick('delete_file_map')(path, cat),
        deleteFileReal: (cat, path) => pick('delete_file_real')(path, cat),
        batchDeleteMap: (cat, paths) => pick('batch_delete_map')(paths, cat),
        batchDeleteReal: (cat, paths) => pick('batch_delete_real')(paths, cat),
        batchAddFavorites: (cat, gid, paths) => pick('batch_add_favorites')(cat, gid, paths),
        batchRemoveFavorites: (cat, paths) => pick('batch_remove_favorites')(cat, paths),
        searchFiles: (kw) => pick('search_files')(kw),
    };
})();

    async moveFavGroup(groupId){

        const cat = state.favCategory;
        if(!cat) return;

        const r = await Api.moveFavGroup(cat, groupId, targetPath);

            toast(r.msg + '\n目标位置: ' + r.dest_dir, 'success');

            await this.refreshAll();
            await this.loadFavGroups(cat);
            // 如果当前正在看这个收藏夹的文件, 刷新文件列表
            if(state.view === 'fav_items' && state.favGroupId === groupId){
                await this.loadFavItems(cat, groupId);

            toast(r.msg, 'error');
        }

    async batchAddToNewFavGroup(name){

        const paths = window._pendingBatchFavPaths || [];
        const cat = state.modal && state.modal.cat;
        if(!paths.length || !cat) return;
        const createR = await Api.createFavGroup(cat, name);
        if(!createR.ok){

            return;
        }
        const r = await Api.batchAddFavorites(cat, createR.group.id, paths);
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            state.modal = null;
            window._pendingBatchFavPaths = null;
            state.batchSelected = {};
            const pathSet = new Set(paths);
            if(state.files[cat]){
                state.files[cat].forEach(f => { if(pathSet.has(f.path)) f.is_favorited = true; });
            }
            if(state.searchResults[cat]){
                state.searchResults[cat].forEach(f => { if(pathSet.has(f.path)) f.is_favorited = true; });
            }
            if(cat === 'project'){
                state.projects.forEach(p => { if(pathSet.has(p.path)) p.is_favorited = true; });
            }
            await this.loadFavGroups(cat);
            this.updateBatchUI();
            this.refreshCurrentView();
        }

    /* -------- 批量操作 -------- */
    toggleBatchMode(){
        state.batchMode = !state.batchMode;
        if(!state.batchMode){
            state.batchSelected = {};
        }
        // 重新渲染当前视图以显示/隐藏 checkbox
        const btn = document.getElementById('batchToggleBtn');
        if(btn) btn.textContent = state.batchMode ? '退出批量' : '批量操作';
        this.refreshCurrentView();
    },
    async toggleVideoPreview(){
        if(!state.videoPreviewEnabled){
            const ok = await confirmDialog(
                '开启视频预览确认',
                '开启预览后可能会导致内存占用高，若出现卡顿可以点击释放内存',
                '确认开启',
                'warning'
            );
            if(!ok) return;
            state.videoPreviewEnabled = true;
        } else {
            state.videoPreviewEnabled = false;
        }
        this.saveSettings();
        this.refreshCurrentView();
    },
    _toggleLock: new Set(),
    toggleSelect(path){
        if(!path || this._toggleLock.has(path)) return;
        this._toggleLock.add(path);
        setTimeout(() => this._toggleLock.delete(path), 60);
        if(state.batchSelected[path]){
            delete state.batchSelected[path];
        } else {
            state.batchSelected[path] = true;
        }
        // 非批量模式下勾选超过2个，自动进入批量模式
        const selectedCount = Object.keys(state.batchSelected).length;
        if(!state.batchMode && selectedCount >= 2){
            state.batchMode = true;
            this.refreshCurrentView();
        }
        this.updateBatchUI();
    },
    selectAllOnPage(){
        const currentList = this.getCurrentList();
        currentList.forEach(f => { state.batchSelected[f.path] = true; });
        this.updateBatchUI();
        this.refreshCurrentView();
    },
    clearSelection(){
        state.batchSelected = {};
        this.updateBatchUI();
        this.refreshCurrentView();
    },
    getCurrentList(){
        const view = state.view;
        if(view === 'video') return paginate(state.isSearching ? state.searchResults.video : state.files.video).items;
        if(view === 'image') return paginate(state.isSearching ? state.searchResults.image : state.files.image).items;
        if(view === 'document') return paginate(state.isSearching ? state.searchResults.document : state.files.document).items;
        if(view === 'project') return paginate(state.projects).items;
        if(view === 'fav_items') return paginate(state.favItems).items;
        return [];
    },
    getSelectedPaths(){
        return Object.keys(state.batchSelected).filter(p => state.batchSelected[p]);
    },
    updateBatchUI(){
        const paths = this.getSelectedPaths();
        const bar = document.getElementById('batchBar');
        if(bar){
            const countEl = bar.querySelector('.batch-count');
            if(countEl) countEl.textContent = paths.length;
            if(paths.length === 0){
                bar.style.display = 'none';
            }
        }
        // 更新 checkbox 视觉状态
        document.querySelectorAll('.file-checkbox').forEach(el => {
            const path = el.closest('.file-card, .doc-card, .folder-card')?.getAttribute('data-path')
                      || el.getAttribute('data-path');
            if(path){
                const isChecked = !!state.batchSelected[path];
                el.classList.toggle('checked', isChecked);
                el.innerHTML = isChecked ? ICONS.checkboxChecked : ICONS.checkbox;
            }
        });
    },
    refreshCurrentView(){
        const view = state.view;
        if(view === 'video') renderVideoView();
        else if(view === 'image') renderImageView();
        else if(view === 'document') renderDocumentView();
        else if(view === 'project') renderProjectView();
        else if(view === 'fav_items') renderFavItemsView();
        else if(view === 'folders') renderFoldersView();
        else if(view === 'fav_groups') renderFavGroupsView();
    },

    /* -------- 文件删除 -------- */
    async deleteFileMap(cat, idx, isFav){
        let list;
        if(isFav) list = state.favItems;
        else if(state.isSearching) list = state.searchResults[cat];
        else list = state.files[cat];
        const file = list && list[idx];
        if(!file) return;
        const r = await Api.deleteFileMap(cat, file.path);
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            if(isFav) state.favItems = state.favItems.filter(f => f.path !== file.path);
            else if(state.isSearching) state.searchResults[cat] = state.searchResults[cat].filter(f => f.path !== file.path);
            else state.files[cat] = state.files[cat].filter(f => f.path !== file.path);
            await this.loadFavGroups(cat);
            this.refreshCurrentView();
        }
    },
    async deleteFileReal(cat, idx, isFav){
        let list;
        if(isFav) list = state.favItems;
        else if(state.isSearching) list = state.searchResults[cat];
        else list = state.files[cat];
        const file = list && list[idx];
        if(!file) return;
        const ok = await confirmDialog(
            '【高危】永久删除确认',
            `你即将永久删除本地真实文件:\n\n${file.path}\n\n⚠ 该操作会直接删除电脑本地真实原文件，删除后不可恢复！`,
            '确认永久删除',
            'danger'
        );
        if(!ok) return;
        const r = await Api.deleteFileReal(cat, file.path);
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            if(isFav) state.favItems = state.favItems.filter(f => f.path !== file.path);
            else if(state.isSearching) state.searchResults[cat] = state.searchResults[cat].filter(f => f.path !== file.path);
            else state.files[cat] = state.files[cat].filter(f => f.path !== file.path);
            await this.loadFavGroups(cat);
            this.refreshCurrentView();
        }
    },

    /* -------- 搜索 -------- */
    onSearchInput(value){
        currentSearchKeyword = value;
        const box = document.getElementById('searchBox');
        const clear = box && box.querySelector('.search-clear');
        if(clear) clear.style.display = value ? 'flex' : 'none';
    },
    async doSearch(){
        const kw = currentSearchKeyword.trim();
        if(!kw){
            state.isSearching = false;
            state.searchResults = {video:[], image:[], document:[]};
            this.refreshCurrentView();
            return;
        }
        state.isSearching = true;
        const r = await Api.searchFiles(kw);
        const raw = r || {video:[], image:[], document:[]};
        state.searchResults = {
            video: sortList(raw.video || []),
            image: sortList(raw.image || []),
            document: sortList(raw.document || [])
        };
        state.currentPage = 1;
        this.refreshCurrentView();
    },
    clearSearch(){
        currentSearchKeyword = '';
        state.isSearching = false;
        state.searchResults = {video:[], image:[], document:[]};
        const input = document.getElementById('searchInput');
        if(input) input.value = '';
        const box = document.getElementById('searchBox');
        const clear = box && box.querySelector('.search-clear');
        if(clear) clear.style.display = 'none';
        this.refreshCurrentView();
    },

    /* -------- 批量操作执行 -------- */
    async batchDeleteMap(){
        const paths = this.getSelectedPaths();
        if(!paths.length) return toast('请先选择文件', 'error');
        const cat = state.view === 'fav_items' ? state.favCategory : state.view;
        let r;
        if(state.view === 'project'){
            r = await Api.batchRemoveProjectFolders(paths);
        } else {
            r = await Api.batchDeleteMap(cat, paths);
        }
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            state.batchSelected = {};
            const pathSet = new Set(paths);
            if(state.view === 'fav_items') state.favItems = state.favItems.filter(f => !pathSet.has(f.path));
            else if(state.view === 'project') state.projects = state.projects.filter(f => !pathSet.has(f.path));
            else if(state.isSearching) state.searchResults[cat] = state.searchResults[cat].filter(f => !pathSet.has(f.path));
            else state.files[cat] = state.files[cat].filter(f => !pathSet.has(f.path));
            await this.loadFavGroups(cat);
            this.updateBatchUI();
            this.refreshCurrentView();
        }
    },
    async batchDeleteReal(){
        const paths = this.getSelectedPaths();
        if(!paths.length) return toast('请先选择文件', 'error');
        const cat = state.view === 'fav_items' ? state.favCategory : state.view;
        const ok = await confirmDialog(
            '【高危】批量永久删除确认',
            `你即将永久删除 ${paths.length} 个本地真实文件。\n\n⚠ 该操作会直接删除电脑本地真实原文件，删除后不可恢复！`,
            '确认永久删除',
            'danger'
        );
        if(!ok) return;
        let r;
        if(state.view === 'project'){
            r = await Api.batchDeleteProjectReal(paths);
        } else {
            r = await Api.batchDeleteReal(cat, paths);
        }
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            state.batchSelected = {};
            const pathSet = new Set(paths);
            if(state.view === 'fav_items') state.favItems = state.favItems.filter(f => !pathSet.has(f.path));
            else if(state.view === 'project') state.projects = state.projects.filter(f => !pathSet.has(f.path));
            else if(state.isSearching) state.searchResults[cat] = state.searchResults[cat].filter(f => !pathSet.has(f.path));
            else state.files[cat] = state.files[cat].filter(f => !pathSet.has(f.path));
            await this.loadFavGroups(cat);
            this.updateBatchUI();
            this.refreshCurrentView();
        }
    },
    async batchAddFavorites(){
        const paths = this.getSelectedPaths();
        if(!paths.length) return toast('请先选择文件', 'error');
        const cat = state.view === 'fav_items' ? state.favCategory : state.view;
        // 打开收藏弹窗选择收藏夹
        window._pendingBatchFavPaths = paths;
        const groups = await Api.getFavGroups(cat);
        state.modal = { type:'fav_dialog_batch', cat, groups };
    },
    async batchAddToFavorites(groupId){
        const paths = window._pendingBatchFavPaths || [];
        const cat = state.modal && state.modal.cat;
        if(!paths.length || !cat) return;
        const r = await Api.batchAddFavorites(cat, groupId, paths);
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            state.modal = null;
            window._pendingBatchFavPaths = null;
            state.batchSelected = {};
            const pathSet = new Set(paths);
            if(state.files[cat]){
                state.files[cat].forEach(f => { if(pathSet.has(f.path)) f.is_favorited = true; });
            }
            if(state.searchResults[cat]){
                state.searchResults[cat].forEach(f => { if(pathSet.has(f.path)) f.is_favorited = true; });
            }
            if(cat === 'project'){
                state.projects.forEach(p => { if(pathSet.has(p.path)) p.is_favorited = true; });
            }
            await this.loadFavGroups(cat);
            this.updateBatchUI();
            this.refreshCurrentView();
        }
    },
    async batchRemoveFavorites(){
        const paths = this.getSelectedPaths();
        if(!paths.length) return toast('请先选择文件', 'error');
        const cat = state.favCategory;
        if(!cat) return;
        const ok = await confirmDialog('取消收藏确认', `确定取消收藏 ${paths.length} 个文件?`, '确认取消');
        if(!ok) return;
        const r = await Api.batchRemoveFavorites(cat, paths);
        toast(r.msg, r.ok ? 'success' : 'error');
        if(r.ok){
            state.batchSelected = {};
            if(cat === 'project'){
                const pathSet = new Set(paths);
                state.projects.forEach(p => { if(pathSet.has(p.path)) p.is_favorited = false; });
            }
            await this.loadFavItems(cat, state.favGroupId);
            await this.loadFavGroups(cat);
            this.updateBatchUI();
        }
    },

    /* -------- 全局图片列表: 上一张 / 下一张 跨文件夹切换 -------- */
    async prevImage(){
        const listSource = state.modal && state.modal.listSource;
        if(listSource === 'favorites') return this.prevFavImage();
        const list = state.files.image;
        const current = state.modal && state.modal.file;
        if(!current || !list.length) return;
        const idx = list.findIndex(f => f.path === current.path);
        if(idx <= 0) return; // 边界拦截: 已是第一张, 静默不操作
        await this.openImageModal(list[idx - 1]);
    },
    async nextImage(){
        const listSource = state.modal && state.modal.listSource;
        if(listSource === 'favorites') return this.nextFavImage();
        const list = state.files.image;
        const current = state.modal && state.modal.file;
        if(!current || !list.length) return;
        const idx = list.findIndex(f => f.path === current.path);
        if(idx < 0 || idx >= list.length - 1) return; // 边界拦截: 已是最后一张
        await this.openImageModal(list[idx + 1]);
    },
    async openImageModal(file, listSource='global'){
        // 独立打开图片模态框 (供模态框内切换复用, 不改变原有 clickFile 逻辑)
        // 如果当前已经是图片模态框, 说明是左右切换, 不显示 loading 避免 DOM 重建导致闪烁
        const isSwitching = state.modal && state.modal.type === 'image';
        if(!isSwitching){
            state.modal = { type:'loading', text:'加载图片中...' };
        }
        const data = await Api.readImage(file.path);
        if(data){
            state.modal = { type:'image', src:data, file, listSource };
            // 后台预加载相邻图片
            const imgList = listSource === 'favorites' ? state.favItems : (state.files.image || []);
            const idx = imgList.findIndex(f => f.path === file.path);
            [idx - 1, idx + 1].forEach(i => {
                const neighbor = imgList[i];
                if(neighbor) Api.readImage(neighbor.path).catch(()=>{});
            });
        } else {
            state.modal = null;
            toast('图片过大或读取失败, 改用系统程序打开', 'error');
            await Api.openFile(file.path);
        }
    },

    /* -------- 全局视频列表: 上一个 / 下一个 跨文件夹切换 -------- */
    async prevVideo(){
        const listSource = state.modal && state.modal.listSource;
        if(listSource === 'favorites') return this.prevFavVideo();
        const list = state.files.video;
        const current = state.modal && state.modal.file;
        if(!current || !list.length) return;
        const idx = list.findIndex(f => f.path === current.path);
        if(idx <= 0) return; // 边界拦截: 已是第一个
        await this.openVideoModal(list[idx - 1]);
    },
    async nextVideo(){
        const listSource = state.modal && state.modal.listSource;
        if(listSource === 'favorites') return this.nextFavVideo();
        const list = state.files.video;
        const current = state.modal && state.modal.file;
        if(!current || !list.length) return;
        const idx = list.findIndex(f => f.path === current.path);
        if(idx < 0 || idx >= list.length - 1) return; // 边界拦截: 已是最后一个
        await this.openVideoModal(list[idx + 1]);
    },
    async openVideoModal(file, listSource='global'){
        // 视频统一调用系统播放器打开, 不再使用内置模态框播放
        await Api.openFile(file.path);
    },
};

function renderTopbar(){
    const v = state.view;
    if(v === 'fav_groups'){
        const catName = FAV_CAT_NAMES[state.favCategory] || '';
        $title.textContent = catName;
        const count = (state.favorites[state.favCategory] || []).length;
        $sub.textContent = `共 ${count} 个收藏夹`;
        return;
    }
    if(v === 'fav_items'){
        const groups = state.favorites[state.favCategory] || [];
        const group = groups.find(g => g.id === state.favGroupId);
        $title.textContent = group ? group.name : '收藏夹';
        $sub.textContent = `共 ${state.favItems.length} 个文件`;
        return;
    }
    $title.textContent = VIEW_TITLES[v] || '';
    if(v === 'folders'){
        $sub.textContent = `已收录 ${state.folders.length} 个遍历目录 · ${state.projectFolders.length} 个项目目录`;
    } else if(v === 'project'){
        $sub.textContent = `共 ${state.projects.length} 个项目文件夹`;
    } else {
        const list = state.files[v] || [];
        $sub.textContent = `共 ${list.length} 个 ${VIEW_TITLES[v]}`;
    }
}

/* ===========================================================
   批量操作浮动栏
   =========================================================== */
function renderBatchBar(){
    if(!$batchBar) return;
    const paths = Object.keys(state.batchSelected).filter(p => state.batchSelected[p]);
    if(!state.batchMode || paths.length === 0){
        $batchBar.style.display = 'none';
        return;
    }
    const isFav = state.view === 'fav_items';
    const showUnfav = isFav;
    const showFav = !isFav;
    $batchBar.style.display = 'flex';
    $batchBar.className = 'batch-bar';
    $batchBar.innerHTML = `
        <div class="batch-bar-info">已选 <strong class="batch-count">${paths.length}</strong> 项</div>
        ${showFav ? `<button class="btn btn-primary" onclick="App.batchAddFavorites()">${ICONS.star} 收藏</button>` : ''}
        ${showUnfav ? `<button class="btn btn-warning" onclick="App.batchRemoveFavorites()">${ICONS.starFilled} 取消</button>` : ''}
        <button class="btn btn-secondary" onclick="App.batchDeleteMap()">${ICONS.close} 移除</button>
        <button class="btn btn-danger" onclick="App.batchDeleteReal()">${ICONS.trash} 删除</button>
        <button class="btn btn-primary" onclick="App.selectAllOnPage()">${ICONS.check} 全选</button>
        <button class="btn" onclick="App.clearSelection()">${ICONS.close} 清空</button>
        <button class="btn" onclick="App.toggleBatchMode()">退出</button>
    `;
}

    const m = state.modal;
    if(!m){ $modalC.innerHTML = ''; return; }

    if(m.type === 'loading'){
        $modalC.innerHTML = `
            <div class="modal-mask" onclick="App.closeModal()">
                <div class="loading" style="color:#fff;">
                    <div class="spinner" style="border-color:rgba(255,255,255,.2);border-top-color:#fff;"></div>
                    <span>${escapeHtml(m.text||'加载中...')}</span>
                </div>
            </div>`;
        return;
    }

    if(m.type === 'image'){
        const file = m.file || {};
        // 计算当前图片位置, 用于边界判断 (支持全局列表和收藏夹列表)
        const imgList = m.listSource === 'favorites' ? state.favItems : (state.files.image || []);
        const imgIdx = imgList.findIndex(f => f.path === file.path);
        const prevCls = imgIdx <= 0 ? 'modal-nav modal-nav-prev disabled' : 'modal-nav modal-nav-prev';
        const nextCls = imgIdx < 0 || imgIdx >= imgList.length - 1 ? 'modal-nav modal-nav-next disabled' : 'modal-nav modal-nav-next';
        // 复用已有 DOM: 如果当前已经是图片模态框, 只更新 src/文本/按钮状态, 避免背景蒙层重建导致闪烁
        const existingMask = $modalC.querySelector('.modal-mask');
        const existingImg = existingMask && existingMask.querySelector('.modal-image');
        if(existingImg){
            console.log('[DOM复用] 图片切换 - 只更新src, 不重建DOM');
            existingImg.src = m.src;
            existingImg.alt = escapeHtml(file.name||'');
            const infoName = existingMask.querySelector('.modal-info-name');
            const infoPath = existingMask.querySelector('.modal-info-path');
            if(infoName) infoName.textContent = escapeHtml(file.name||'');
            if(infoPath) infoPath.textContent = escapeHtml(file.path||'');
            const prevBtn = existingMask.querySelector('.modal-nav-prev');
            const nextBtn = existingMask.querySelector('.modal-nav-next');
            if(prevBtn) prevBtn.className = prevCls;
            if(nextBtn) nextBtn.className = nextCls;

        return;

/* ===========================================================
   通用工具: confirm / toast / esc(给单引号属性用)
   =========================================================== */
function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function confirmDialog(title, message, okText, mode='primary'){
    return new Promise(resolve => {
        const $t = document.getElementById('toastContainer');
        const id = 'tc_' + Date.now() + Math.random();
        let okCls, wrapCls;
        if(mode === 'danger'){ okCls = 'btn btn-danger'; wrapCls = 'toast confirm danger'; }
        else if(mode === 'warning'){ okCls = 'btn btn-warning'; wrapCls = 'toast confirm warning'; }
        else{ okCls = 'btn btn-primary'; wrapCls = 'toast confirm'; }
        $t.insertAdjacentHTML('beforeend',
            `<div class="${wrapCls}" id="${id}">
                <div class="toast-title">${escapeHtml(title)}</div>
                <div class="toast-msg">${escapeHtml(message).replace(/\n/g,'<br>')}</div>
                <div class="toast-confirm-actions">
                    <button class="btn" onclick="document.getElementById('${id}').remove();__tcResolve_${id.replace(/\./g,'_')}(false)">取消</button>
                    <button class="${okCls}" onclick="document.getElementById('${id}').remove();__tcResolve_${id.replace(/\./g,'_')}(true)">${escapeHtml(okText||'确认')}</button>
                </div>
            </div>`);
        window['__tcResolve_' + id.replace(/\./g,'_')] = (val) => {
            delete window['__tcResolve_' + id.replace(/\./g,'_')];
            resolve(val);
        };
    });
}

function promptDialog(title, message, defaultValue=''){
    return new Promise(resolve => {
        state.modal = { type:'prompt', title, message, defaultValue };
        window.__promptResolve = (val) => {
            state.modal = null;
            window.__promptResolve = null;
            resolve(val);
        };
    });
}

function toast(message, type){
    const $t = document.getElementById('toastContainer');
    const id = 't_' + Date.now() + Math.random();
    const icon = type==='success' ? ICONS.check
               : type==='error'   ? ICONS.alert
               : ICONS.inbox;
    $t.insertAdjacentHTML('beforeend',
        `<div class="toast ${type||''}" id="${id}">${icon}<span>${escapeHtml(message)}</span></div>`);
    setTimeout(() => {
        const el = document.getElementById(id);
        if(el){ el.style.transition='opacity .3s'; el.style.opacity='0';
                setTimeout(()=>el.remove(), 320); }
    }, 2400);
}

/* ===========================================================
   视频悬浮预览: 封面 + 悬浮循环播放
   1. 默认状态: 显示 OpenCV 截取的中间帧封面
   2. 鼠标悬浮: 连贯循环快速播放预览帧序列
   3. 鼠标移开: 立刻停止播放，切回静态封面
   全程只读取视频本地原始路径，不复制/转码/修改原文件
   =========================================================== */
const _videoPreviewCache = new Map();   // path -> {frames, timer, index}
const _VIDEO_PREVIEW_FPS = 4;           // 预览帧率 4fps，32帧 = 8秒完整概览
const _VIDEO_PREVIEW_DELAY = 1000;      // 悬停 1 秒后才加载预览
const _VIDEO_PREVIEW_CACHE_MAX = 6;     // 最多缓存 6 个视频的预览帧
let _videoPreviewDelayTimer = null;     // 延迟定时器
let _currentPreviewPath = null;         // 当前正在预览的视频路径（限制并发=1）
let _hoveringPath = null;               // 当前鼠标所在的卡片路径，用于异步请求返回后校验

async function setupVideoPreviews(){
    const cards = $content.querySelectorAll('.video-card');
    if(!cards.length) return;

    // 第一步: 懒加载封面（进入视口才请求，避免一次性加载过多）
    if('IntersectionObserver' in window){
        const coverObs = new IntersectionObserver(async (entries) => {
            for(const ent of entries){
                if(!ent.isIntersecting) continue;
                coverObs.unobserve(ent.target);
                const path = ent.target.getAttribute('data-path');
                const thumb = ent.target.querySelector('.video-thumb');
                if(!path || !thumb) continue;

                // 异步请求封面（中间帧），优先读磁盘缓存
                const cover = await Api.getVideoCover(path);
                if(cover){
                    const img = document.createElement('img');
                    img.src = cover;
                    img.className = 'video-cover';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;';
                    thumb.appendChild(img);
                    // 隐藏默认图标
                    const ph = thumb.querySelector('.file-thumb-ph');
                    if(ph) ph.style.display = 'none';
                }
            }
        }, { rootMargin:'150px' });
        cards.forEach(c => coverObs.observe(c));
    }

    // 第二步: 绑定悬浮/移开事件（事件委托，mouseover/mouseout 冒泡阶段）
    // 通过 relatedTarget 过滤子元素间移动，悬停 1 秒后触发预览，限制并发=1，移开立即释放内存
    $content.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.video-card');
        if(!card) return;
        const path = card.getAttribute('data-path');
        if(!path) return;
        // 过滤子元素间移动：relatedTarget 在卡片内部说明是从子元素移入，忽略
        if(card.contains(e.relatedTarget)) return;

        _hoveringPath = path;

        // 清除上一个延迟定时器（防止快速划过时堆积）
        if(_videoPreviewDelayTimer){
            clearTimeout(_videoPreviewDelayTimer);
            _videoPreviewDelayTimer = null;
        }

        // 如果已经有其他卡片在预览，先停止它（限制并发=1）
        if(_currentPreviewPath && _currentPreviewPath !== path){
            const prevCard = $content.querySelector('.video-card[data-path="' + CSS.escape(_currentPreviewPath) + '"]');
            if(prevCard) stopVideoHoverPreview(prevCard, true);
        }

        // 延迟 1 秒后再启动预览
        _videoPreviewDelayTimer = setTimeout(() => {
            _videoPreviewDelayTimer = null;
            startVideoHoverPreview(card, path);
        }, _VIDEO_PREVIEW_DELAY);
    });

    $content.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.video-card');
        if(!card) return;
        const path = card.getAttribute('data-path');
        if(!path) return;
        // 过滤子元素间移动：relatedTarget 在卡片内部说明是移入子元素，忽略
        if(card.contains(e.relatedTarget)) return;

        _hoveringPath = null;

        // 清除延迟定时器（防止离开后定时器仍然触发）
        if(_videoPreviewDelayTimer){
            clearTimeout(_videoPreviewDelayTimer);
            _videoPreviewDelayTimer = null;
        }

        stopVideoHoverPreview(card, true);
    });
}

async function startVideoHoverPreview(card, path){
    // 预览开关关闭时不触发
    if(!state.videoPreviewEnabled) return;
    const thumb = card.querySelector('.video-thumb');
    if(!thumb) return;

    _currentPreviewPath = path;

    // 获取或创建预览 img 元素
    let previewImg = thumb.querySelector('.video-preview-img');
    if(!previewImg){
        previewImg = document.createElement('img');
        previewImg.className = 'video-preview-img';
        previewImg.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:2;display:none;';
        thumb.appendChild(previewImg);
    }

    // 获取或缓存预览帧
    let cache = _videoPreviewCache.get(path);
    if(!cache || !cache.frames){
        // 首次悬浮此视频，向后端请求预览帧序列
        const frames = await Api.getVideoPreview(path);

        // 关键修复：请求返回后检查鼠标是否仍然在此卡片上，若已移走则不显示预览
        if(_hoveringPath !== path){
            _currentPreviewPath = null;
            return;
        }

        if(!frames || !frames.length){
            _currentPreviewPath = null;
            return;
        }
        cache = { frames, timer:null, index:0 };
        // 缓存上限保护：超出时淘汰最早进入的
        if(_videoPreviewCache.size >= _VIDEO_PREVIEW_CACHE_MAX){
            const firstKey = _videoPreviewCache.keys().next().value;
            _videoPreviewCache.delete(firstKey);
        }
        _videoPreviewCache.set(path, cache);
    }

    // 再次检查鼠标是否仍然在卡片上（缓存命中时也需要）
    if(_hoveringPath !== path){
        _currentPreviewPath = null;
        return;
    }

    // 隐藏封面，显示预览层
    const coverImg = thumb.querySelector('.video-cover');
    const ph = thumb.querySelector('.file-thumb-ph');
    if(coverImg) coverImg.style.display = 'none';
    if(ph) ph.style.display = 'none';
    previewImg.style.display = 'block';

    // 启动循环切换帧
    const frameMs = 1000 / _VIDEO_PREVIEW_FPS;  // 约 83ms
    cache.index = 0;
    if(cache.timer) clearInterval(cache.timer);

    cache.timer = setInterval(() => {
        if(!cache || !cache.frames || !cache.frames.length) return;
        previewImg.src = cache.frames[cache.index];
        cache.index = (cache.index + 1) % cache.frames.length;
    }, frameMs);
}

/**
 * 停止视频预览
 * @param {HTMLElement} card - 视频卡片
 * @param {boolean} releaseMemory - 是否释放内存（移开时传 true，切页时传 false）
 */
function stopVideoHoverPreview(card, releaseMemory){
    const thumb = card.querySelector('.video-thumb');
    if(!thumb) return;
    const path = card.getAttribute('data-path');

    // 停止定时器
    const cache = _videoPreviewCache.get(path);
    if(cache && cache.timer){
        clearInterval(cache.timer);
        cache.timer = null;
    }

    // 切回静态封面
    const previewImg = thumb.querySelector('.video-preview-img');
    const coverImg = thumb.querySelector('.video-cover');
    const ph = thumb.querySelector('.file-thumb-ph');

    if(previewImg) previewImg.style.display = 'none';
    if(coverImg) coverImg.style.display = 'block';
    else if(ph) ph.style.display = 'flex';

    // 移开时彻底释放内存，不做磁盘缓存
    if(releaseMemory && path){
        _videoPreviewCache.delete(path);
        if(_currentPreviewPath === path) _currentPreviewPath = null;
    }
}

/* ===========================================================
   全局拖拽监听 - 在窗口任何位置拖入文件夹都能识别
   注: 不同 webview 后端对 file.path 的支持不一致
       - Edge Chromium (Windows 默认) 通常可拿到 file.path
       - 拿不到时, 提示用户用"选择目录"按钮兜底
   =========================================================== */
const $globalDrop = document.getElementById('globalDrop');
let _dragDepth = 0;

/* 在 window 捕获阶段阻止默认拖拽行为，防止 WebView2 弹出新窗口导航到文件 */
window.addEventListener('dragover', e => { e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; }, true);
window.addEventListener('drop', e => { e.preventDefault(); }, true);

document.addEventListener('dragenter', e => {
    if(e.dataTransfer && e.dataTransfer.types.includes('Files')){
        _dragDepth++;
        $globalDrop.innerHTML = `<div class="global-drop-hint"><span>松手即可添加文件夹</span></div>`;
    }
});
let _lastDragX = 0, _lastDragY = 0;
document.addEventListener('dragover', e => { e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect = 'copy'; _lastDragX = e.clientX; _lastDragY = e.clientY; });
// 阻止默认拖放行为，防止 WebView 弹出文件浏览器窗口
document.body.ondrop = () => false;
document.addEventListener('dragleave', e => {
    _dragDepth = Math.max(0, _dragDepth - 1);
    if(_dragDepth === 0) $globalDrop.innerHTML = '';
});

/* 统一处理拖拽路径 —— 左侧遍历收录 */
async function processDroppedPaths(paths){
    if(!paths || paths.length === 0){
        toast('未能识别拖拽路径，请使用顶部【选择目录】按钮添加文件夹', 'error');
        return;
    }
    let added = 0;
    for(const p of paths){
        const r = await Api.addFolder(p);
        if(r.ok){
            added++;
            await App.refreshOne(p);
        } else {
            toast(r.msg, 'error');
        }
    }
    if(added > 0){
        toast(`成功添加 ${added} 个目录`, 'success');
        state.folders = await Api.getFolders();
        App.refreshCurrentView();
    }
}

/* 统一处理拖拽路径 —— 右侧项目收录 */
async function processDroppedProjectPaths(paths){
    if(!paths || paths.length === 0){
        toast('未能识别拖拽路径，请使用顶部【选择目录】按钮添加文件夹', 'error');
        return;
    }
    let added = 0;
    for(const p of paths){
        const r = await Api.addProjectFolder(p);
        if(r.ok) added++;
        else toast(r.msg, 'error');
    }
    if(added > 0){
        toast(`成功添加 ${added} 个项目目录`, 'success');
        state.projectFolders = await Api.getProjectFolders();
        App.refreshCurrentView();
    }
}

/* Python 端拦截到 file:// 导航时回调此函数（见 main.py monkey-patch） */
window.__onExternalDrop = function(paths){
    // 如果在"我的目录"页面，尝试根据最后鼠标位置判断是左侧还是右侧
    if(state.view === 'folders' && _lastDragX > 0){
        const el = document.elementFromPoint(_lastDragX, _lastDragY);
        if(el && el.closest('#projectPanel')){
            processDroppedProjectPaths(paths);
            return;
        }
    }
    processDroppedPaths(paths);
};

document.addEventListener('drop', async e => {
    e.preventDefault();
    e.stopPropagation();
    _dragDepth = 0;
    $globalDrop.innerHTML = '';
    state.dragOver = false;

    const dt = e.dataTransfer;
    if(!dt) return;

    const paths = [];
    // 方式1: file.path (pywebview / electron 扩展, 常见)
    if(dt.files && dt.files.length){
        for(const f of dt.files){
            if(f.path) paths.push(f.path);
        }
    }
    // 方式2: text/uri-list (部分 webview 通过 URI 提供路径)
    if(paths.length === 0){
        const uri = dt.getData && dt.getData('text/uri-list');
        if(uri){
            uri.split('\n').forEach(line => {
                line = line.trim();
                if(line && !line.startsWith('#')){
                    let p = line.replace(/^file:\/\/\//,'')
                                .replace(/^file:\/\//,'');
                    try { p = decodeURIComponent(p); } catch(_) {}
                    if(p) paths.push(p);
                }
            });
        }
    }
    // 方式3: text/plain (后备, 某些环境下直接拿到本地路径字符串)
    if(paths.length === 0){
        const plain = dt.getData && dt.getData('text/plain');
        if(plain){
            plain.split('\n').forEach(line => {
                line = line.trim();
                if(line){
                    let p = line.replace(/^file:\/\/\//,'')
                                .replace(/^file:\/\//,'');
                    try { p = decodeURIComponent(p); } catch(_) {}
                    if(p && !paths.includes(p)) paths.push(p);
                }
            });
        }
    }

    // 判断 drop 目标：临时隐藏全局覆盖层，用 elementFromPoint 获取下方真实元素
    $globalDrop.style.display = 'none';
    const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
    $globalDrop.style.display = '';
    const isProjectDrop = dropTarget && dropTarget.closest('#projectPanel');
    if(isProjectDrop){
        await processDroppedProjectPaths(paths);
    } else {
        await processDroppedPaths(paths);
    }
});

/* ===========================================================
   图片缩略图懒加载 - 进入视口才请求 Base64
   避免一次性把几千张图全读到内存
   =========================================================== */
function lazyLoadImageThumbs(){
    if(!('IntersectionObserver' in window)) return;
    const cards = $content.querySelectorAll('.file-card[data-img-idx]');
    if(!cards.length) return;
    const obs = new IntersectionObserver(async (entries) => {
        for(const ent of entries){
            if(!ent.isIntersecting) continue;
            obs.unobserve(ent.target);
            const idx = parseInt(ent.target.getAttribute('data-img-idx'), 10);
            const file = state.isSearching ? state.searchResults.image[idx] : state.files.image[idx];
            if(!file) continue;
            const thumb = ent.target.querySelector('.file-thumb');
            const data = await Api.getImageThumb(file.path);
            if(data && thumb){
                // 只追加图片，不要覆盖 innerHTML（会删掉收藏按钮）
                const img = document.createElement('img');
                img.src = data;
                img.alt = '';
                thumb.appendChild(img);
                const ph = thumb.querySelector('.file-thumb-ph');
                if(ph) ph.style.display = 'none';
            }
        }
    }, { rootMargin:'200px' });
    cards.forEach(c => obs.observe(c));
}

/* ===========================================================
   ESC 关闭模态框
   =========================================================== */
document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && state.modal && state.modal.type !== 'confirm'){
        App.closeModal();
    }
    // 左右方向键支持图片/视频全局列表切换
    if(state.modal){
        if(state.modal.type === 'image'){
            if(e.key === 'ArrowLeft'){ e.preventDefault(); App.prevImage(); }
            if(e.key === 'ArrowRight'){ e.preventDefault(); App.nextImage(); }
        }
        if(state.modal.type === 'video'){
            if(e.key === 'ArrowLeft'){ e.preventDefault(); App.prevVideo(); }
            if(e.key === 'ArrowRight'){ e.preventDefault(); App.nextVideo(); }
        }
    }
});

/* ===========================================================
   启动: 等待 pywebview 就绪, 然后加载数据
   =========================================================== */
(async () => {
    await waitPyWebview();
    // 获取后端版本号并显示
    try{
        const ver = await Api.getVersion();
        if(ver){
            const badge = document.getElementById('versionBadge');
            if(badge) badge.textContent = 'v' + ver;
        }
    }catch(e){ /* 忽略版本号获取失败 */ }
    await App.loadSettings();

    // 启动时优先使用扫描缓存, 避免每次打开都重新遍历磁盘
    // 只有首次启动(无缓存)或收录目录有变化时, 才自动扫描
    console.log('[启动] 开始加载缓存...');
    try{
        const cached = await Api.getCachedFiles();
        console.log('[启动] getCachedFiles 返回:', {
            video: cached.video ? cached.video.length : 'N/A',
            image: cached.image ? cached.image.length : 'N/A',
            document: cached.document ? cached.document.length : 'N/A'
        });
        const hasCache = (cached.video && cached.video.length) ||
                         (cached.image && cached.image.length) ||
                         (cached.document && cached.document.length);
        if(hasCache){
            console.log('[启动] 缓存有效, 直接加载缓存数据');
            state.folders = await Api.getFolders();
            state.projectFolders = await Api.getProjectFolders();
            console.log('[启动] folders 加载完成, 数量:', state.folders.length);
            state.files = cached;
            console.log('[启动] files 已赋值, view=', state.view);
        }else{
            console.log('[启动] 缓存为空或失效, 执行 scanAll');
            await App.refreshAll();
        }
    }catch(e){
        console.error('[启动] 缓存读取失败:', e);
        // 缓存读取失败兜底: 正常扫描
        await App.refreshAll();
    }

    // 启动时预加载所有收藏夹数据
    await Promise.all([
        App.loadFavGroups('video'),
        App.loadFavGroups('image'),
        App.loadFavGroups('document'),
        App.loadFavGroups('project')
    ]);
})();
